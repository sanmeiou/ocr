<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>专业图片翻译（彻底消除中文·完美融合）</title>
    <style>
        *{box-sizing:border-box}
        body{margin:0;padding:20px;background:#f7f8fa;font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif}
        .container{max-width:1000px;margin:0 auto;background:#fff;border-radius:12px;padding:24px;box-shadow:0 4px 20px rgba(0,0,0,0.08)}
        h2{margin-top:0;color:#1a1a1a;display:flex;align-items:center;gap:10px}
        .btn-group{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:20px;padding-bottom:15px;border-bottom:1px solid #eee}
        button{background:#0070f3;color:#fff;border:none;padding:12px 20px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s}
        button:hover{background:#0061d1;transform:translateY(-1px)}
        button:disabled{background:#cbd5e1;cursor:not-allowed;transform:none}
        #result-status{background:#f8f9fa;padding:12px;border-left:4px solid #0070f3;border-radius:4px;margin-bottom:15px;font-size:14px;color:#444}
        #preview{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px}
        .img-box{position:relative;border:1px solid #eee;border-radius:8px;overflow:hidden;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,0.04)}
        .img-box img{width:100%;display:block;height:auto}
        .desc{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.7);color:#fff;padding:6px;font-size:12px;text-align:center}
        #log-area{margin-top:15px;font-family:monospace;font-size:12px;color:#666;max-height:100px;overflow-y:auto;background:#fafafa;padding:10px;border-radius:6px}
    </style>
</head>
<body>
<div class="container">
    <h2>📷 专业图片翻译（智能填充版）</h2>
    <div class="btn-group">
        <input type="file" id="file" accept="image/*" multiple style="display:none">
        <button onclick="document.getElementById('file').click()">📁 批量选择图片</button>
        <button onclick="startBatch()" id="startBtn">🚀 开始翻译</button>
        <button onclick="downloadAll()" disabled id="downloadBtn">💾 下载 ZIP 结果</button>
    </div>

    <div id="result-status">准备就绪，请上传图片</div>
    <div id="preview"></div>
    <div id="log-area"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
<script>
let images = [];
let processedImages = [];
const downloadBtn = document.getElementById("downloadBtn");
const startBtn = document.getElementById("startBtn");

document.getElementById("file").onchange = async (e) => {
    const files = Array.from(e.target.files);
    if (!files.length) return;
    images = []; 
    processedImages = []; 
    downloadBtn.disabled = true;
    document.getElementById("preview").innerHTML = "";
    
    for (const file of files) {
        const b64 = await readAsBase64(file);
        images.push({ file, b64, name: file.name });
    }
    document.getElementById("result-status").innerText = `已加载 ${images.length} 张图片`;
    addLog("文件读取完成，点击开始进行识别");
};

async function startBatch() {
    if (!images.length) { alert("请先选择图片"); return; }
    startBtn.disabled = true;
    processedImages = [];
    document.getElementById("preview").innerHTML = "";
    
    for (const img of images) {
        addLog(`正在处理: ${img.name}...`);
        const res = await processOne(img);
        processedImages.push(res);
    }
    
    document.getElementById("result-status").innerText = "✅ 批量翻译完成！";
    addLog("全部任务执行完毕");
    downloadBtn.disabled = false;
    startBtn.disabled = false;
}

async function processOne(img) {
    return new Promise((resolve) => {
        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");
        const imageObj = new Image();
        imageObj.src = img.b64;
        
        imageObj.onload = async () => {
            canvas.width = imageObj.width;
            canvas.height = imageObj.height;
            ctx.drawImage(imageObj, 0, 0);

            try {
                // 1. 获取 Token (调用你已解决的 API)
                const tokenResp = await fetch("/api/token");
                const token = await tokenResp.text();

                // 2. OCR 识别
                const form = new URLSearchParams();
                form.append("image", img.b64.split(",")[1]);
                form.append("language_type", "CHN_ENG");

                const ocrRes = await fetch(
                    "https://aip.baidubce.com/rest/2.0/ocr/v1/general?access_token=" + token,
                    { method: "POST", headers: { "Content-Type": "application/x-www-form-urlencoded" }, body: form }
                );
                const data = await ocrRes.json();
                
                if (data.words_result) {
                    const items = data.words_result;
                    for (const item of items) {
                        if (/[\u4e00-\u9fa5]/.test(item.words)) {
                            // 翻译
                            const transText = await realTranslate(item.words);
                            const l = item.location;

                            // --- 核心优化渲染步骤 ---
                            
                            // A. 采样背景色：取文字区域左上角边缘的像素
                            const sampleX = Math.max(0, l.left - 1);
                            const sampleY = Math.max(0, l.top - 1);
                            const pixel = ctx.getImageData(sampleX, sampleY, 1, 1).data;
                            const r = pixel[0], g = pixel[1], b = pixel[2];

                            // B. 覆盖原文字：使用背景色填充（稍微扩大1px消除锯齿边缘）
                            ctx.fillStyle = `rgb(${r},${g},${b})`;
                            ctx.fillRect(l.left - 1, l.top - 1, l.width + 2, l.height + 2);

                            // C. 计算文字对比色：感知亮度算法
                            const brightness = (r * 299 + g * 587 + b * 114) / 1000;
                            ctx.fillStyle = brightness > 125 ? "#000000" : "#ffffff";

                            // D. 动态字号与自动缩放
                            let fontSize = Math.round(l.height * 0.8);
                            ctx.font = `bold ${fontSize}px Arial`;
                            let metrics = ctx.measureText(transText);
                            
                            // 如果翻译后太长，自动缩小字号直到塞进宽度
                            while (metrics.width > l.width && fontSize > 8) {
                                fontSize--;
                                ctx.font = `bold ${fontSize}px Arial`;
                                metrics = ctx.measureText(transText);
                            }

                            ctx.textBaseline = "middle";
                            ctx.fillText(transText, l.left, l.top + l.height / 2);
                        }
                    }
                }

                const finalImg = canvas.toDataURL("image/png");
                showImage(finalImg, img.name);
                resolve({ ...img, final: finalImg });

            } catch (e) {
                addLog(`错误: ${img.name} 处理失败 - ` + e.message);
                showImage(img.b64, img.name);
                resolve({ ...img, final: img.b64 });
            }
        };
    });
}

async function realTranslate(text) {
    try {
        const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=zh-CN&tl=en&dt=t&q=${encodeURIComponent(text)}`;
        const r = await fetch(url);
        const j = await r.json();
        return j[0][0][0] || text;
    } catch (e) {
        return text;
    }
}

async function downloadAll() {
    const zip = new JSZip();
    processedImages.forEach((img, i) => {
        if (img.final) {
            const fileName = `Trans_${img.name.split('.')[0]}.png`;
            zip.file(fileName, img.final.split(",")[1], { base64: true });
        }
    });
    zip.generateAsync({ type: "blob" }).then(b => saveAs(b, "翻译图片包.zip"));
}

function readAsBase64(file) {
    return new Promise(r => {
        const rd = new FileReader();
        rd.onload = e => r(e.target.result);
        rd.readAsDataURL(file);
    });
}

function showImage(src, name) {
    const box = document.createElement("div");
    box.className = "img-box";
    box.innerHTML = `<img src="${src}"><div class="desc">${name}</div>`;
    document.getElementById("preview").appendChild(box);
}

function addLog(msg) {
    const logArea = document.getElementById("log-area");
    const now = new Date().toLocaleTimeString();
    logArea.innerHTML += `<div>[${now}] ${msg}</div>`;
    logArea.scrollTop = logArea.scrollHeight;
}
</script>
</body>
</html>
