<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>专业图片翻译（无白块·完美融合）</title>
<style>
*{box-sizing:border-box}
body{margin:0;padding:20px;background:#f7f8fa;font-family:Arial}
.container{max-width:900px;margin:0 auto;background:#fff;border-radius:12px;padding:24px;box-shadow:0 0 10px #00000010}
h2{margin-top:0;color:#333}
button{background:#0070f3;color:#fff;border:none;padding:10px 16px;border-radius:8px;width:auto;font-size:15px;margin:6px 4px 6px 0;cursor:pointer}
button:disabled{background:#cbd5e1}
#result{background:#f8f9fa;padding:12px;border-radius:8px;margin:10px 0;max-height:220px;overflow-y:auto;white-space:pre-wrap;font-size:13px}
#preview{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-top:16px}
.img-box{position:relative;border:1px solid #eee;border-radius:8px;overflow:hidden;background:#fafafa}
.img-box img{width:100%;display:block}
.desc{position:absolute;bottom:0;left:0;right:0;background:#00000080;color:#fff;padding:4px;font-size:12px}
.log{color:#666;font-size:12px;margin-top:8px}
.btn-group{display:flex;flex-wrap:wrap;align-items:center}
</style>
</head>
<body>
<div class="container">
  <h2>📷 专业图片翻译（无白块·完美融合）</h2>
  <div class="btn-group">
    <input type="file" id="file" accept="image/*" multiple style="display:none">
    <button onclick="document.getElementById('file').click()">📁 批量选择图片</button>
    <button onclick="startBatch()">🚀 批量识别翻译</button>
    <button onclick="downloadAll()" disabled id="downloadBtn">💾 下载全部</button>
  </div>
  <div id="result">等待操作...</div>
  <div id="preview"></div>
  <div class="log" id="log"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
<script>
let images = [];
let processedImages = [];
const downloadBtn = document.getElementById("downloadBtn");

document.getElementById("file").onchange = async (e) => {
  const files = Array.from(e.target.files);
  if (!files.length) return;
  images = []; processedImages = []; downloadBtn.disabled = true;
  for (const file of files) {
    const b64 = await readAsBase64(file);
    images.push({ file, b64, name: file.name });
  }
  document.getElementById("result").innerText = `已加载 ${images.length} 张图片`;
  log("已选择图片，准备处理");
};

async function startBatch() {
  if (!images.length) { alert("请先选图片"); return; }
  downloadBtn.disabled = true; processedImages = []; clearPreview();
  for (const img of images) {
    log("处理：" + img.name);
    const res = await processOne(img);
    processedImages.push(res);
  }
  log("✅ 全部处理完成");
  downloadBtn.disabled = false;
}

async function processOne(img) {
  try {
    // 1. OCR token
    const tokenResp = await fetch("/api/token");
    const token = await tokenResp.text();

    // 2. 百度OCR
    const form = new URLSearchParams();
    form.append("image", img.b64.split(",")[1]);
    form.append("language_type", "CHN_ENG");

    const ocrRes = await fetch(
      "https://aip.baidubce.com/rest/2.0/ocr/v1/general?access_token=" + token,
      { method: "POST", headers: { "Content-Type": "application/x-www-form-urlencoded" }, body: form }
    );
    const data = await ocrRes.json();
    if (!data.words_result) return img;

    // 只保留中文
    const chineseItems = data.words_result.filter(item => hasChinese(item.words));
    
    // 3. 翻译（正常可用）
    const translated = await Promise.all(
      chineseItems.map(it => realTranslate(it.words))
    );

    // 4. 无白块渲染（直接覆盖英文，不擦背景）
    const finalImg = renderNoWhite(img.b64, chineseItems, translated);
    showImage(finalImg, img.name);
    return { ...img, final: finalImg };
  } catch (e) {
    console.error(e);
    return img;
  }
}

// 翻译接口（正常可用）
async function realTranslate(text) {
  try {
    const url = "https://translate.googleapis.com/translate_a/single?client=gtx&sl=zh-CN&tl=en&dt=t&q=" + encodeURIComponent(text);
    const r = await fetch(url);
    const j = await r.json();
    return j[0][0][0] || text;
  } catch (e) {
    return text;
  }
}

// ==========================
// ✅ 核心：无白块渲染
// 🔥 完全删除 clearRect，不擦除任何背景
// 直接在原图上写英文，无任何白块！
// ==========================
function renderNoWhite(b64, words, trans) {
  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");
  const img = new Image();
  img.src = b64;
  canvas.width = img.width;
  canvas.height = img.height;
  ctx.drawImage(img, 0, 0);

  words.forEach((it, i) => {
    const l = it.location;
    const dst = trans[i] || it.words;

    // 🔥 关键：这里彻底删掉了 clearRect，无任何白块
    const fontSize = Math.round(l.height * 0.85);
    ctx.font = `600 ${fontSize}px Arial`;
    ctx.fillStyle = "#000";
    ctx.textBaseline = "top";
    ctx.fillText(dst, l.left, l.top);
  });

  return canvas.toDataURL("image/png");
}

function hasChinese(str) {
  return /[\u4e00-\u9fa5]/.test(str);
}

// 批量下载
async function downloadAll() {
  const zip = new JSZip();
  processedImages.forEach((img, i) => {
    if (img.final) zip.file(`翻译_${img.name || i+".png"}`, img.final.split(",")[1], { base64: true });
  });
  zip.generateAsync({ type: "blob" }).then(b => saveAs(b, "翻译完成.zip"));
}

// 工具
function readAsBase64(file) {
  return new Promise(r => {
    const rd = new FileReader();
    rd.onload = e => r(e.target.result);
    rd.readAsDataURL(file);
  });
}
function showImage(src, name) {
  const box = document.createElement("div");
  box.className = "img-box";
  box.innerHTML = `<img src="${src}"><div class="desc">${name}</div>`;
  document.getElementById("preview").appendChild(box);
}
function clearPreview() { document.getElementById("preview").innerHTML = ""; }
function log(msg) { document.getElementById("log").innerText = msg; }
</script>
</body>
</html>
