<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>专业图片翻译（无痕纹理融合版）</title>
    <style>
        *{box-sizing:border-box}
        body{margin:0;padding:20px;background:#f0f2f5;font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif}
        .container{max-width:1100px;margin:0 auto;background:#fff;border-radius:16px;padding:30px;box-shadow:0 10px 30px rgba(0,0,0,0.1)}
        h2{margin-top:0;color:#1a1a1a;display:flex;align-items:center;gap:12px;font-size:24px}
        h2 span{color:#0070f3; font-weight: bold;}
        .btn-group{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:25px;padding-bottom:20px;border-bottom:1px solid #eee}
        input[type="file"]{display:none}
        .btn{padding:12px 24px;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;transition:all 0.2s;border:none;display:inline-flex;align-items:center;gap:8px}
        .btn-primary{background:#0070f3;color:#fff}
        .btn-primary:hover{background:#0061d1;transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,112,243,0.3)}
        .btn-success{background:#28a745;color:#fff}
        .btn-success:hover{background:#218838;transform:translateY(-1px);box-shadow:0 4px 12px rgba(40,167,69,0.3)}
        .btn:disabled{background:#cbd5e1;cursor:not-allowed;transform:none;box-shadow:none}
        #result-status{background:#e6f7ff;padding:15px;border-left:5px solid #1890ff;border-radius:6px;margin-bottom:20px;font-size:15px;color:#004085;font-weight:500}
        #preview{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
        .img-box{position:relative;border:1px solid #e8e8e8;border-radius:12px;overflow:hidden;background:#fff;box-shadow:0 4px 15px rgba(0,0,0,0.05);transition:transform 0.3s}
        .img-box:hover{transform:scale(1.02)}
        .img-box img{width:100%;display:block;height:auto}
        .desc{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.75);color:#fff;padding:8px;font-size:13px;text-align:center;backdrop-filter:blur(4px)}
        #log-area{margin-top:20px;font-family:'Consolas',monospace;font-size:12px;color:#555;max-height:120px;overflow-y:auto;background:#f8f9fa;padding:15px;border-radius:8px;border:1px solid #eee}
        #log-area div{margin-bottom:4px;border-bottom:1px solid #f1f1f1}
        .loading-dots:after { content: ' .'; animation: dots 1.5s steps(5, end) infinite; }
        @keyframes dots { 0%, 20% { color: rgba(0,0,0,0); text-shadow: .25em 0 0 rgba(0,0,0,0), .5em 0 0 rgba(0,0,0,0); } 40% { color: #666; text-shadow: .25em 0 0 rgba(0,0,0,0), .5em 0 0 rgba(0,0,0,0); } 60% { text-shadow: .25em 0 0 #666, .5em 0 0 rgba(0,0,0,0); } 80%, 100% { text-shadow: .25em 0 0 #666, .5em 0 0 #666; } }
    </style>
</head>
<body>
<div class="container">
    <h2>📷 专业图片翻译 <span>（无痕融合版）</span></h2>
    <div class="btn-group">
        <input type="file" id="file" accept="image/*" multiple>
        <button class="btn btn-primary" onclick="document.getElementById('file').click()">📁 批量选择图片</button>
        <button class="btn btn-success" onclick="startBatch()" id="startBtn">🚀 开始翻译</button>
        <button class="btn btn-primary" onclick="downloadAll()" disabled id="downloadBtn">💾 下载结果 ZIP</button>
    </div>

    <div id="result-status">准备就绪，请上传图片...</div>
    <div id="preview"></div>
    <div id="log-area"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
<script>
let images = [];
let processedImages = [];
const downloadBtn = document.getElementById("downloadBtn");
const startBtn = document.getElementById("startBtn");

document.getElementById("file").onchange = async (e) => {
    const files = Array.from(e.target.files);
    if (!files.length) return;
    images = []; 
    processedImages = []; 
    downloadBtn.disabled = true;
    document.getElementById("preview").innerHTML = "";
    
    for (const file of files) {
        const b64 = await readAsBase64(file);
        images.push({ file, b64, name: file.name });
    }
    document.getElementById("result-status").innerHTML = `已加载 <b>${images.length}</b> 张图片`;
    addLog("文件读取完成，随时可以开始");
};

async function startBatch() {
    if (!images.length) { alert("请先选择图片"); return; }
    startBtn.disabled = true;
    startBtn.innerHTML = '<span class="loading-dots">正在处理</span>';
    processedImages = [];
    document.getElementById("preview").innerHTML = "";
    
    for (const img of images) {
        addLog(`正在智能处理: ${img.name}...`);
        const res = await processOne(img);
        processedImages.push(res);
    }
    
    document.getElementById("result-status").innerHTML = "✅ <b>批量翻译及无痕融合完成！</b>";
    addLog("全部任务执行完毕");
    downloadBtn.disabled = false;
    startBtn.disabled = false;
    startBtn.innerHTML = '🚀 开始翻译';
}

// 核心优化函数：无痕抹除与融合
async function processOne(img) {
    return new Promise((resolve) => {
        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");
        const imageObj = new Image();
        imageObj.src = img.b64;
        
        imageObj.onload = async () => {
            canvas.width = imageObj.width;
            canvas.height = imageObj.height;
            ctx.drawImage(imageObj, 0, 0);

            try {
                const tokenResp = await fetch("/api/token");
                const token = await tokenResp.text();

                const form = new URLSearchParams();
                form.append("image", img.b64.split(",")[1]);
                form.append("language_type", "CHN_ENG");

                const ocrRes = await fetch(
                    "https://aip.baidubce.com/rest/2.0/ocr/v1/general?access_token=" + token,
                    { method: "POST", headers: { "Content-Type": "application/x-www-form-urlencoded" }, body: form }
                );
                const data = await ocrRes.json();
                
                if (data.words_result) {
                    const items = data.words_result;
                    // 按面积从小到大处理，先处理小字，防止大面积填充覆盖小字区域的采样
                    items.sort((a,b) => (a.location.width * a.location.height) - (b.location.width * b.location.height));

                    for (const item of items) {
                        if (/[\u4e00-\u9fa5]/.test(item.words)) {
                            const transText = await realTranslate(item.words);
                            const l = item.location;

                            // ====== [无痕融合核心算法启动] ======
                            
                            // 1. 定义扩展采样区域（向外扩展2-3px，捕捉纯净背景）
                            const ext = 3; 
                            const box = {
                                x: Math.max(0, l.left - ext),
                                y: Math.max(0, l.top - ext),
                                w: l.width + ext * 2,
                                h: l.height + ext * 2
                            };

                            // 防止溢出画布
                            if(box.x + box.w > canvas.width) box.w = canvas.width - box.x;
                            if(box.y + box.h > canvas.height) box.h = canvas.height - box.y;

                            // 2. 多点背景采样 (左上，右上，左下，右下)
                            const getPixel = (x, y) => ctx.getImageData(x, y, 1, 1).data;
                            
                            const pTL = getPixel(box.x, box.y); // Top-Left
                            const pTR = getPixel(box.x + box.w - 1, box.y); // Top-Right
                            const pBL = getPixel(box.x, box.y + box.h - 1); // Bottom-Left
                            const pBR = getPixel(box.x + box.w - 1, box.y + box.h - 1); // Bottom-Right

                            // 3. 创建自适应纹理层 (利用 Canvas 渐变模拟)
                            const textureCanvas = document.createElement('canvas');
                            textureCanvas.width = box.w;
                            textureCanvas.height = box.h;
                            const tCtx = textureCanvas.getContext('2d');

                            // A. 绘制基础双向线性渐变 (水平 + 垂直)
                            // 水平渐变 (左 -> 右)
                            const gradH = tCtx.createLinearGradient(0, 0, box.w, 0);
                            gradH.addColorStop(0, `rgb(${pTL[0]},${pTL[1]},${pTL[2]})`);
                            gradH.addColorStop(1, `rgb(${pTR[0]},${pTR[1]},${pTR[2]})`);
                            tCtx.fillStyle = gradH;
                            tCtx.fillRect(0, 0, box.w, box.h);

                            // 垂直渐变叠加 (上 -> 下，使用较轻的透明度融合)
                            tCtx.globalCompositeOperation = 'source-over';
                            const gradV = tCtx.createLinearGradient(0, 0, 0, box.h);
                            // 这里采用四个角的平均色来过渡，增加色彩丰富 an
                            gradV.addColorStop(0, `rgba(${pTL[0]},${pTL[1]},${pTL[2]}, 0.5)`);
                            gradV.addColorStop(1, `rgba(${pBL[0]},${pBL[1]},${pBL[2]}, 0.5)`);
                            tCtx.fillStyle = gradV;
                            tCtx.fillRect(0, 0, box.w, box.h);

                            // B. 纹理混合 (模拟景深虚化/噪点，让填充不那么死板)
                            tCtx.globalCompositeOperation = 'soft-light'; // 柔光模式混合原纹理
                            tCtx.drawImage(canvas, box.x, box.y, box.w, box.h, 0, 0, box.w, box.h);
                            
                            // C. 边缘柔化 (创建一个径向透明蒙版，让中心完全覆盖，边缘慢慢透明)
                            const maskCanvas = document.createElement('canvas');
                            maskCanvas.width = box.w;
                            maskCanvas.height = box.h;
                            const mCtx = maskCanvas.getContext('2d');
                            
                            // 创建羽化蒙版
                            const feather = tCtx.createRadialGradient(
                                box.w/2, box.h/2, 0, // 中心
                                box.w/2, box.h/2, Math.max(box.w, box.h)/2 // 边缘
                            );
                            feather.addColorStop(0, 'rgba(0,0,0,1)'); // 中心完全不透明
                            feather.addColorStop(0.8, 'rgba(0,0,0,1)'); // 80% 区域保持覆盖
                            feather.addColorStop(1, 'rgba(0,0,0,0)'); // 边缘完全透明（露出原图纹理）
                            
                            mCtx.fillStyle = feather;
                            mCtx.fillRect(0, 0, box.w, box.h);

                            // 应用蒙版到纹理
                            tCtx.globalCompositeOperation = 'destination-in';
                            tCtx.drawImage(maskCanvas, 0, 0);

                            // 4. 将合成好的“无痕补丁”贴回主画布
                            ctx.drawImage(textureCanvas, box.x, box.y);

                            // ====== [背景融合结束，开始绘制文字] ======

                            // 5. 计算文字自适应颜色 (使用四个采样的平均亮度)
                            const avgR = (pTL[0] + pTR[0] + pBL[0] + pBR[0]) / 4;
                            const avgG = (pTL[1] + pTR[1] + pBL[1] + pBR[1]) / 4;
                            const avgB = (pTL[2] + pTR[2] + pBL[2] + pBR[2]) / 4;
                            const brightness = (avgR * 299 + avgG * 587 + avgB * 114) / 1000;
                            
                            // 文字颜色与环境色保持一致性但要有对比
                            if(brightness > 128) {
                                // 浅色背景：深色字，偏采样色的深色
                                ctx.fillStyle = `rgb(${Math.max(0,avgR-150)},${Math.max(0,avgG-150)},${Math.max(0,avgB-150)})`;
                            } else {
                                // 深色背景：高亮字
                                ctx.fillStyle = "#ffffff";
                            }

                            // 6. 动态字号与自适应缩放 (优化了最小字号)
                            let fontSize = Math.round(l.height * 0.82);
                            if(fontSize < 12) fontSize = 12; // 保证可读性
                            
                            ctx.font = `600 ${fontSize}px 'PingFang SC', Arial`;
                            let metrics = ctx.measureText(transText);
                            
                            while (metrics.width > l.width && fontSize > 9) {
                                fontSize--;
                                ctx.font = `600 ${fontSize}px 'PingFang SC', Arial`;
                                metrics = ctx.measureText(transText);
                            }

                            // 添加轻微阴影，增加复杂背景下的可读性
                            if(brightness <= 128) {
                                ctx.shadowColor = 'rgba(0,0,0,0.5)';
                                ctx.shadowBlur = 2;
                            } else {
                                ctx.shadowColor = 'rgba(255,255,255,0.8)';
                                ctx.shadowBlur = 2;
                            }

                            ctx.textBaseline = "middle";
                            ctx.fillText(transText, l.left, l.top + l.height / 2);
                            
                            // 清除阴影状态，避免影响下一行
                            ctx.shadowBlur = 0;
                            ctx.shadowColor = 'transparent';
                        }
                    }
                }

                const finalImg = canvas.toDataURL("image/png");
                showImage(finalImg, img.name);
                resolve({ ...img, final: finalImg });

            } catch (e) {
                addLog(`错误: ${img.name} 处理中断 - ` + e.message);
                showImage(img.b64, img.name);
                resolve({ ...img, final: img.b64 });
            }
        };
    });
}

// --- 保持不变的辅助函数 ---
async function realTranslate(text) {
    try {
        const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=zh-CN&tl=en&dt=t&q=${encodeURIComponent(text)}`;
        const r = await fetch(url);
        const j = await r.json();
        return j[0][0][0] || text;
    } catch (e) {
        return text;
    }
}

async function downloadAll() {
    const zip = new JSZip();
    processedImages.forEach((img, i) => {
        if (img.final) {
            const fileName = `Trans_Seamless_${img.name.split('.')[0]}.png`;
            zip.file(fileName, img.final.split(",")[1], { base64: true });
        }
    });
    zip.generateAsync({ type: "blob" }).then(b => saveAs(b, "专业翻译无痕融合结果.zip"));
}

function readAsBase64(file) {
    return new Promise(r => {
        const rd = new FileReader();
        rd.onload = e => r(e.target.result);
        rd.readAsDataURL(file);
    });
}

function showImage(src, name) {
    const box = document.createElement("div");
    box.className = "img-box";
    box.innerHTML = `<img src="${src}"><div class="desc">${name}</div>`;
    document.getElementById("preview").appendChild(box);
}

function addLog(msg) {
    const logArea = document.getElementById("log-area");
    const now = new Date().toLocaleTimeString();
    logArea.innerHTML += `<div>[${now}] ${msg}</div>`;
    logArea.scrollTop = logArea.scrollHeight;
}
</script>
</body>
</html>
