<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>图片文字翻译工具（中→英）</title>
<style>
body{padding:30px;background:#f5f5f5;font-family:Arial;margin:0}
.container{max-width:700px;margin:0 auto;background:white;padding:25px;border-radius:12px;box-shadow:0 0 12px #00000008}
button{background:#0070f3;color:white;border:none;padding:12px 20px;border-radius:8px;width:100%;font-size:16px;margin:10px 0;cursor:pointer}
button:disabled{background:#94a3b8}
#result{background:#f8f9fa;padding:15px;border-radius:8px;white-space:pre-wrap;max-height:200px;overflow-y:auto;font-size:13px;margin-top:10px}
#preview{border:1px solid #eee;border-radius:10px;padding:15px;min-height:220px;display:flex;align-items:center;justify-content:center;background:#fff;margin-top:10px}
img{max-width:100%;max-height:350px}
.info{color:#666;font-size:12px;margin-top:5px}
</style>
</head>
<body>
<div class="container">
  <h2>图片文字识别 + 自动翻译（中→英）</h2>
  <input type="file" id="file" accept="image/*">
  <button onclick="start()">开始识别 & 翻译</button>
  <div id="preview">预览区</div>
  <div id="result"></div>
  <div class="info" id="log"></div>
</div>

<script>
let imgB64 = "";
const API_KEY = "NzB0gbHUNvtLS5FGArJhr2pC";
const SECRET_KEY = "RQBUjGep2V1W0rXhj0VEiXbDK7GdHrfC";

// 百度翻译（中→英）
async function translateCnToEn(text) {
  const res = await fetch("/api/translate", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ q: text })
  });
  const data = await res.json();
  return data.trans_result || text;
}

// 选择图片
document.getElementById("file").onchange = function (e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    imgB64 = reader.result;
    document.getElementById("preview").innerHTML = `<img src="${imgB64}">`;
    log("图片已加载：" + file.name);
  };
  reader.readAsDataURL(file);
};

// 主流程
async function start() {
  if (!imgB64) { alert("请上传图片"); return; }
  log("正在获取授权...");

  // 1. 获取OCR Token
  const token = await (await fetch("/api/token")).text();
  if (!token) { log("授权失败"); return; }

  // 2. OCR识别
  log("正在调用百度OCR...");
  const form = new URLSearchParams();
  form.append("image", imgB64.split(",")[1]);
  form.append("language_type", "CHN_ENG");

  const ocrRes = await fetch("https://aip.baidubce.com/rest/2.0/ocr/v1/general?access_token="+token, {
    method:"POST",
    headers:{"Content-Type":"application/x-www-form-urlencoded"},
    body:form
  });

  const data = await ocrRes.json();
  if (!data.words_result) { log("识别失败：" + JSON.stringify(data)); return; }

  // 3. 翻译
  log("正在翻译...");
  const texts = data.words_result.map(it => it.words);
  const translatedTexts = await Promise.all(texts.map(t => translateCnToEn(t)));

  // 4. 显示结果
  let out = "【识别结果】\n";
  data.words_result.forEach((it,i)=> out += it.words + " → " + translatedTexts[i] + "\n");
  document.getElementById("result").innerText = out;

  // 5. 渲染到图片（覆盖文字）
  renderTranslatedImage(data.words_result, translatedTexts);
}

// 渲染翻译后的图片
function renderTranslatedImage(wordsResult, translatedTexts) {
  const img = new Image();
  img.src = imgB64;

  img.onload = () => {
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");
    canvas.width = img.width;
    canvas.height = img.height;
    ctx.drawImage(img, 0, 0);

    // 覆盖文字
    wordsResult.forEach((item, i) => {
      const loc = item.location;
      const txt = translatedTexts[i];

      // 1. 清空原文字区域
      ctx.fillStyle = "#fff";
      ctx.fillRect(loc.left, loc.top, loc.width, loc.height);

      // 2. 写翻译后的文字
      ctx.font = Math.round(loc.height * 0.75) + "px Arial";
      ctx.fillStyle = "#000";
      ctx.textBaseline = "top";
      ctx.fillText(txt, loc.left, loc.top);
    });

    // 显示
    const outImg = document.createElement("img");
    outImg.src = canvas.toDataURL("image/png");
    document.getElementById("preview").innerHTML = "";
    document.getElementById("preview").appendChild(outImg);
    log("渲染完成 ✅");
  };
}

function log(msg) {
  document.getElementById("log").innerText = msg;
}
</script>
</body>
</html>
