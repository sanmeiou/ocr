<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 智能图片翻译专家 (无痕版)</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --card: #ffffff; }
        body { margin: 0; font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg); color: #1e293b; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: var(--card); border-radius: 16px; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        
        header { text-align: center; margin-bottom: 30px; }
        h2 { margin: 0; color: #0f172a; font-size: 24px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        p { color: #64748b; margin-top: 8px; }

        .btn-group { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-bottom: 24px; padding-bottom: 24px; border-bottom: 1px solid #e2e8f0; }
        
        button { 
            display: inline-flex; align-items: center; gap: 8px; padding: 12px 24px; 
            border-radius: 10px; border: none; font-weight: 600; cursor: pointer; 
            transition: all 0.2s; font-size: 14px;
        }
        .btn-upload { background: #f1f5f9; color: #475569; }
        .btn-run { background: var(--primary); color: white; }
        .btn-run:hover { background: #1d4ed8; transform: translateY(-1px); }
        .btn-run:disabled { background: #cbd5e1; cursor: not-allowed; }
        .btn-download { background: #10b981; color: white; }

        #status { background: #eff6ff; color: #1e40af; padding: 12px; border-radius: 8px; font-size: 13px; margin-bottom: 20px; display: none; text-align: center; }

        #preview { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); 
            gap: 20px; margin-top: 20px; 
        }
        .img-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; overflow: hidden; position: relative; }
        .img-card img { width: 100%; height: 180px; object-fit: contain; background: #f8fafc; display: block; }
        .img-tag { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.6); color: white; padding: 2px 8px; border-radius: 4px; font-size: 10px; }
        .img-info { padding: 10px; font-size: 12px; color: #64748b; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h2>📷 专业图片翻译系统</h2>
        <p>自动识别中文并以相近底色抹除，替换为英文</p>
    </header>

    <div class="btn-group">
        <input type="file" id="file" accept="image/*" multiple style="display:none">
        <button class="btn-upload" onclick="document.getElementById('file').click()">📁 选择多张图片</button>
        <button class="btn-run" id="startBtn">🚀 开始批量处理</button>
        <button class="btn-download" id="downBtn" disabled>💾 下载全部 (ZIP)</button>
    </div>

    <div id="status">准备就绪</div>

    <div id="preview"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>

<script>
let imageList = [];
let processedList = [];

const fileInput = document.getElementById('file');
const statusBox = document.getElementById('status');
const previewGrid = document.getElementById('preview');
const downBtn = document.getElementById('downBtn');

// 1. 文件选择
fileInput.onchange = async (e) => {
    const files = Array.from(e.target.files);
    if (!files.length) return;
    
    imageList = [];
    previewGrid.innerHTML = '';
    statusBox.style.display = 'block';
    
    for (const file of files) {
        const b64 = await toBase64(file);
        imageList.push({ name: file.name, b64 });
        renderCard(b64, file.name);
    }
    updateStatus(`已加载 ${imageList.length} 张图片`);
};

// 2. 核心处理逻辑
document.getElementById('startBtn').onclick = async () => {
    if (!imageList.length) return alert("请先选图");
    
    processedList = [];
    downBtn.disabled = true;
    
    for (let i = 0; i < imageList.length; i++) {
        updateStatus(`正在处理 (${i+1}/${imageList.length}): ${imageList[i].name}`);
        const result = await processSingleImage(imageList[i]);
        processedList.push(result);
    }
    
    updateStatus("✅ 任务全部完成！");
    downBtn.disabled = false;
};

async function processSingleImage(imgData) {
    return new Promise((resolve) => {
        const img = new Image();
        img.src = imgData.b64;
        img.onload = async () => {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0);

            try {
                // 这里调用百度 OCR (需自行处理 token 逻辑)
                const ocrResult = await mockOCRRequest(imgData.b64); 
                
                if (ocrResult.words_result) {
                    for (const item of ocrResult.words_result) {
                        if (/[\u4e00-\u9fa5]/.test(item.words)) {
                            const trans = await translateAPI(item.words);
                            // 执行“无损”覆盖
                            smartCleanAndFill(ctx, item.location, trans);
                        }
                    }
                }
                const final = canvas.toDataURL('image/png');
                updateCard(imgData.name, final);
                resolve({ name: imgData.name, final });
            } catch (e) {
                resolve({ name: imgData.name, final: imgData.b64 });
            }
        };
    });
}

// 3. 【核心算法】智能消除与文字填充
function smartCleanAndFill(ctx, loc, text) {
    const { left, top, width, height } = loc;
    
    // 从文字框左上角往外偏移 2 像素取样，获取背景色
    const sampleX = Math.max(0, left - 2);
    const sampleY = Math.max(0, top - 2);
    const pixel = ctx.getImageData(sampleX, sampleY, 1, 1).data;
    const bgColor = `rgb(${pixel[0]}, ${pixel[1]}, ${pixel[2]})`;
    
    // 用背景色覆盖中文，彻底消除“白块”
    ctx.fillStyle = bgColor;
    ctx.fillRect(left - 1, top - 1, width + 2, height + 2);

    // 计算背景亮度，决定文字用黑色还是白色
    const brightness = (pixel[0] * 299 + pixel[1] * 587 + pixel[2] * 114) / 1000;
    ctx.fillStyle = brightness > 125 ? "#000000" : "#ffffff";
    
    // 写入翻译后的英文
    const fontSize = Math.floor(height * 0.85);
    ctx.font = `bold ${fontSize}px Arial`;
    ctx.textBaseline = "top";
    ctx.fillText(text, left, top + (height - fontSize)/2);
}

// --- 模拟与辅助函数 ---

async function translateAPI(text) {
    try {
        const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=zh-CN&tl=en&dt=t&q=${encodeURIComponent(text)}`);
        const json = await res.json();
        return json[0][0][0];
    } catch { return "Error"; }
}

async function mockOCRRequest(b64) {
    // 这里应为你真实的 fetch 到百度 API 的逻辑
    // 为了让代码可运行，此处返回空结果，请替换为您原本的百度 OCR 调用代码
    return { words_result: [] }; 
}

function toBase64(file) {
    return new Promise(r => {
        const rd = new FileReader();
        rd.onload = e => r(e.target.result);
        rd.readAsDataURL(file);
    });
}

function updateStatus(msg) { statusBox.innerText = msg; }

function renderCard(src, name) {
    const div = document.createElement('div');
    div.className = 'img-card';
    div.id = `card-${name}`;
    div.innerHTML = `<img src="${src}"><div class="img-tag">待处理</div><div class="img-info">${name}</div>`;
    previewGrid.appendChild(div);
}

function updateCard(name, newSrc) {
    const card = document.getElementById(`card-${name}`);
    if (card) {
        card.querySelector('img').src = newSrc;
        card.querySelector('.img-tag').innerText = '已完成';
        card.querySelector('.img-tag').style.background = '#10b981';
    }
}

downBtn.onclick = async () => {
    const zip = new JSZip();
    processedList.forEach(img => {
        zip.file(`translated_${img.name}`, img.final.split(',')[1], {base64: true});
    });
    const content = await zip.generateAsync({type: "blob"});
    saveAs(content, "翻译完成.zip");
};
</script>
</body>
</html>
